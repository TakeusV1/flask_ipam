<!-- Flash message -->
{% with errors = get_flashed_messages(with_categories=true,category_filter=["success","warning","danger","error"]) %}
{% if errors %}
{% for category, message in errors %}
<div class="alert alert-dismissible alert-{{ category }} m-0" style="position:fixed;top:5%;left:38%;z-index:10;min-width:25%;">
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  <p class="mb-0"><b>{{ message }}</b></a></p>
</div>
{% endfor %}
{% endif %}
{% endwith %}
<!-- END|Flash message -->
